name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck and build frontend
        run: bun run build

  rust:
    name: Rust
    runs-on: windows-latest

    defaults:
      run:
        working-directory: src-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-rs -> target"

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  tauri-build:
    name: Tauri NSIS smoke build
    runs-on: windows-latest
    needs:
      - frontend
      - rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-rs -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows NSIS installer
        run: >
          bun run tauri build
          --bundles nsis
          --config '{"bundle":{"createUpdaterArtifacts":false}}'
          --ci
          --no-sign
